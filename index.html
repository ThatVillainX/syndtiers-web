<!DOCTYPE html>
<html>
<head>
  <title>SyndTiers</title>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .navbar {
      background: #111827;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .player {
      background: #1f2937;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .userid {
      font-size: 18px;
    }

    .tiers span {
      background: #374151;
      padding: 5px 10px;
      margin: 3px;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="navbar">🔥 SyndTiers</div>

<div class="container" id="players"></div>

<script>
fetch("https://syndtiers-api.onrender.com/api/tiers")
  .then(res => res.json())
  .then(data => {
    const playersDiv = document.getElementById("players");

    Object.entries(data.tiers).forEach(([userId, tiers]) => {
      const div = document.createElement("div");
      div.className = "player";

      let tierHTML = "";
      Object.entries(tiers).forEach(([mode, tier]) => {
        tierHTML += `<span>${mode}: ${tier}</span>`;
      });

      div.innerHTML = `
        <div class="userid">${userId}</div>
        <div class="tiers">${tierHTML}</div>
      `;

      playersDiv.appendChild(div);
    });
  });
</script>

</body>
</html>
