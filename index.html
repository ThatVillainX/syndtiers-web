<!DOCTYPE html>
<html>
<head>
  <title>SyndTiers</title>
  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
    }

    .player {
      display: flex;
      justify-content: space-between;
      background: #111827;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    .rank {
      font-weight: bold;
      color: gold;
    }
  </style>
</head>

<body>

<h1>🏆 SyndTiers Leaderboard</h1>

<div id="leaderboard"></div>

<script>
fetch("https://syndtiers-api.onrender.com/api/tiers")
.then(res => res.json())
.then(data => {
  const container = document.getElementById("leaderboard");

  let rank = 1;

  for (let userId in data.tiers) {
    const tiers = data.tiers[userId];

    const div = document.createElement("div");
    div.className = "player";

    div.innerHTML = `
      <span class="rank">#${rank}</span>
      <span>${userId}</span>
      <span>${JSON.stringify(tiers)}</span>
    `;

    container.appendChild(div);
    rank++;
  }
});
</script>

</body>
</html>
